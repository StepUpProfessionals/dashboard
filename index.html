<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SBS Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* =========================
       VARIABLES / BASE
    ========================== */
    :root{
      --navy:#00274D;
      --navy-2:#0A3966;
      --navy-soft:#EAF1F8;
      --teal:#008080;
      --teal-soft:#E6F6F6;
      --bg:#F6F8FB;
      --surface:#FFFFFF;
      --surface-2:#FBFCFE;
      --text:#152235;
      --muted:#66768A;
      --line:#E6EBF2;
      --green:#2FA66A;
      --green-soft:#EAF8F0;
      --red:#D85C5C;
      --red-soft:#FDEEEE;
      --amber:#C98A1D;
      --amber-soft:#FFF4DE;
      --violet:#6C63FF;
      --violet-soft:#EFEFFF;
      --shadow:0 14px 34px rgba(0, 39, 77, 0.08);
      --radius:20px;
      --radius-sm:14px;
      --sidebar-width:258px;
      --transition:.22s ease;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Inter",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:linear-gradient(180deg,#F7FAFD 0%, #F4F7FB 100%);
      color:var(--text);
      min-height:100vh;
    }
    button,input,select{
      font:inherit;
    }
    button{
      cursor:pointer;
      border:none;
      background:none;
    }
    a{
      color:inherit;
      text-decoration:none;
    }
    .muted{color:var(--muted)}
    .nowrap{white-space:nowrap}

    /* =========================
       APP LAYOUT
    ========================== */
    .app-shell{
      display:flex;
      min-height:100vh;
    }
    .sidebar{
      position:fixed;
      inset:0 auto 0 0;
      width:var(--sidebar-width);
      background:
        radial-gradient(circle at top right, rgba(0,128,128,.22), transparent 35%),
        linear-gradient(180deg, #032E58 0%, #00274D 100%);
      color:#fff;
      padding:22px 16px 20px;
      display:flex;
      flex-direction:column;
      z-index:40;
      border-right:1px solid rgba(255,255,255,.08);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 10px 18px;
      border-bottom:1px solid rgba(255,255,255,.1);
      margin-bottom:18px;
    }
    .brand-mark{
      width:42px;
      height:42px;
      border-radius:14px;
      background:linear-gradient(135deg, #0E4A84 0%, #0A9E9E 100%);
      position:relative;
      box-shadow:0 10px 24px rgba(0,0,0,.16);
      flex:0 0 auto;
    }
    .brand-mark::before,
    .brand-mark::after{
      content:"";
      position:absolute;
      border-radius:999px;
      background:#fff;
      opacity:.95;
    }
    .brand-mark::before{
      width:18px;height:6px;left:12px;top:11px;
    }
    .brand-mark::after{
      width:10px;height:10px;left:16px;top:22px;
    }
    .brand h2{
      margin:0;
      font-size:1rem;
      letter-spacing:.01em;
      font-weight:800;
    }
    .brand p{
      margin:.15rem 0 0;
      font-size:.78rem;
      color:rgba(255,255,255,.68);
    }

    .nav-list{
      display:grid;
      gap:8px;
      margin-top:4px;
    }
    .nav-item{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      padding:13px 14px;
      border-radius:16px;
      color:rgba(255,255,255,.78);
      transition:var(--transition);
      font-weight:600;
      text-align:left;
    }
    .nav-item:hover{
      background:rgba(255,255,255,.08);
      color:#fff;
    }
    .nav-item.active{
      background:rgba(255,255,255,.12);
      color:#fff;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .nav-icon{
      width:22px;
      text-align:center;
      font-size:1rem;
      opacity:.95;
    }
    .sidebar-foot{
      margin-top:auto;
      padding:14px 12px 10px;
      border-top:1px solid rgba(255,255,255,.1);
      color:rgba(255,255,255,.68);
      font-size:.82rem;
      line-height:1.45;
    }

    .main{
      margin-left:var(--sidebar-width);
      width:calc(100% - var(--sidebar-width));
      padding:26px 28px 110px;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      margin-bottom:22px;
      padding:6px 0 16px;
      backdrop-filter:blur(10px);
      background:linear-gradient(180deg, rgba(246,248,251,.95) 0%, rgba(246,248,251,.78) 70%, rgba(246,248,251,0) 100%);
    }
    .eyebrow{
      margin:0 0 6px;
      font-size:.8rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--teal);
      font-weight:700;
    }
    .topbar h1{
      margin:0;
      font-size:clamp(1.6rem, 2vw, 2rem);
      letter-spacing:-.03em;
    }
    .topbar-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .ghost-btn,
    .primary-btn,
    .soft-btn{
      border-radius:14px;
      padding:11px 14px;
      font-weight:700;
      transition:var(--transition);
      white-space:nowrap;
    }
    .ghost-btn{
      background:#fff;
      color:var(--navy);
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }
    .ghost-btn:hover{transform:translateY(-1px)}
    .primary-btn{
      color:#fff;
      background:linear-gradient(135deg, var(--navy) 0%, var(--teal) 100%);
      box-shadow:0 10px 24px rgba(0, 39, 77, .18);
    }
    .primary-btn:hover{transform:translateY(-1px)}
    .soft-btn{
      background:var(--navy-soft);
      color:var(--navy);
      border:1px solid transparent;
    }
    .soft-btn:hover{
      background:#fff;
      border-color:var(--line);
    }

    /* =========================
       CARDS / BLOCKS
    ========================== */
    .view{display:none}
    .view.active{display:block}

    .kpi-grid,
    .stats-grid,
    .cards-grid,
    .content-grid,
    .dashboard-grid{
      display:grid;
      gap:16px;
    }
    .kpi-grid{
      grid-template-columns:repeat(auto-fit, minmax(210px, 1fr));
      margin-bottom:16px;
    }
    .stats-grid{
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
    }
    .dashboard-grid{
      grid-template-columns:1.3fr .9fr;
      margin-bottom:16px;
    }
    .content-grid{
      grid-template-columns:1.15fr .85fr;
      margin-bottom:16px;
    }
    .cards-grid{
      grid-template-columns:repeat(auto-fit, minmax(285px, 1fr));
    }

    .card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card-body{
      padding:18px;
    }
    .metric-card{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:130px;
      background:
        radial-gradient(circle at top right, rgba(0,128,128,.07), transparent 38%),
        linear-gradient(180deg, #FFFFFF 0%, #FCFDFE 100%);
    }
    .metric-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-weight:600;
      font-size:.92rem;
    }
    .metric-icon{
      width:36px;height:36px;border-radius:12px;
      display:grid;place-items:center;
      background:var(--navy-soft);
      color:var(--navy);
      font-size:1rem;
      flex:0 0 auto;
    }
    .metric-value{
      margin:0;
      font-size:1.8rem;
      font-weight:800;
      letter-spacing:-.03em;
      color:var(--navy);
    }
    .metric-foot{
      margin-top:auto;
      color:var(--muted);
      font-size:.86rem;
      line-height:1.45;
    }

    .section-card{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }
    .section-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
    }
    .section-title{
      margin:0;
      font-size:1.06rem;
      font-weight:800;
      letter-spacing:-.02em;
      color:var(--navy);
    }
    .section-subtitle{
      margin:4px 0 0;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.45;
    }

    .summary-strip{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }
    .summary-chip{
      padding:10px 12px;
      border-radius:14px;
      background:#fff;
      border:1px solid var(--line);
      color:var(--navy);
      font-size:.88rem;
      font-weight:700;
      box-shadow:var(--shadow);
    }
    .summary-chip span{
      color:var(--muted);
      font-weight:600;
      margin-right:8px;
    }

    /* =========================
       BADGES / STATUS
    ========================== */
    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border-radius:999px;
      padding:7px 10px;
      font-size:.78rem;
      font-weight:800;
      line-height:1;
      white-space:nowrap;
      letter-spacing:.01em;
    }
    .badge::before{
      content:"";
      width:7px;height:7px;
      border-radius:50%;
      background:currentColor;
      opacity:.85;
    }
    .badge.green{background:var(--green-soft);color:var(--green)}
    .badge.red{background:var(--red-soft);color:var(--red)}
    .badge.teal{background:var(--teal-soft);color:var(--teal)}
    .badge.amber{background:var(--amber-soft);color:var(--amber)}
    .badge.navy{background:var(--navy-soft);color:var(--navy)}
    .badge.violet{background:var(--violet-soft);color:var(--violet)}
    .badge.gray{background:#F1F4F8;color:#7C8A9B}

    /* =========================
       LISTS / ROWS
    ========================== */
    .list-stack{
      display:grid;
      gap:12px;
    }
    .list-item{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:14px 14px;
      border:1px solid var(--line);
      border-radius:16px;
      background:var(--surface-2);
    }
    .list-item strong{
      display:block;
      margin-bottom:4px;
      color:var(--navy);
    }
    .list-item p{
      margin:0;
      color:var(--muted);
      font-size:.88rem;
      line-height:1.45;
    }
    .list-right{
      display:flex;
      flex-direction:column;
      align-items:flex-end;
      gap:7px;
      min-width:max-content;
    }

    .progress-track{
      width:100%;
      height:8px;
      border-radius:999px;
      background:#ECF0F4;
      overflow:hidden;
      margin-top:10px;
    }
    .progress-fill{
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--navy) 0%, var(--teal) 100%);
    }

    /* =========================
       TOOLBAR / FILTERS
    ========================== */
    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }
    .field{
      display:flex;
      flex-direction:column;
      gap:6px;
      min-width:180px;
      flex:1 1 180px;
    }
    .field label{
      font-size:.8rem;
      font-weight:700;
      color:var(--muted);
    }
    .control{
      width:100%;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:12px 13px;
      outline:none;
      color:var(--text);
      transition:var(--transition);
      box-shadow:0 2px 0 rgba(0,0,0,0);
    }
    .control:focus{
      border-color:rgba(0,128,128,.45);
      box-shadow:0 0 0 4px rgba(0,128,128,.08);
    }

    /* =========================
       TABLES
    ========================== */
    .table-wrap{
      overflow:auto;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
    }
    table{
      width:100%;
      border-collapse:collapse;
      min-width:960px;
    }
    thead th{
      position:sticky;
      top:0;
      background:#F8FAFD;
      color:var(--muted);
      font-size:.78rem;
      letter-spacing:.03em;
      text-transform:uppercase;
      text-align:left;
      padding:13px 14px;
      border-bottom:1px solid var(--line);
      z-index:1;
    }
    tbody td{
      padding:14px;
      border-bottom:1px solid #EEF2F6;
      font-size:.92rem;
      vertical-align:top;
    }
    tbody tr:hover{
      background:#FBFDFF;
    }
    tbody tr:last-child td{
      border-bottom:none;
    }
    .cell-title{
      font-weight:700;
      color:var(--navy);
    }
    .cell-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:.84rem;
      line-height:1.45;
    }

    /* =========================
       PIPELINE
    ========================== */
    .pipeline-board{
      display:grid;
      grid-template-columns:repeat(4, minmax(230px, 1fr));
      gap:16px;
      margin-bottom:16px;
    }
    .pipeline-column{
      background:#fff;
      border:1px solid var(--line);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow);
    }
    .pipeline-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }
    .pipeline-top h3{
      margin:0;
      font-size:.95rem;
      color:var(--navy);
    }
    .pipeline-count{
      padding:7px 10px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:800;
      background:#F3F6FA;
      color:var(--navy);
    }
    .mini-stack{
      display:grid;
      gap:10px;
    }
    .mini-card{
      padding:12px;
      border-radius:16px;
      border:1px solid var(--line);
      background:var(--surface-2);
    }
    .mini-card strong{
      display:block;
      font-size:.92rem;
      color:var(--navy);
      margin-bottom:4px;
    }
    .mini-card p{
      margin:0;
      color:var(--muted);
      font-size:.82rem;
      line-height:1.45;
    }
    .mini-meta{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
      margin-top:10px;
    }

    /* =========================
       CONTACT / PROJECT CARDS
    ========================== */
    .contact-card,
    .project-card{
      padding:18px;
      border-radius:22px;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at top right, rgba(0,39,77,.035), transparent 30%),
        linear-gradient(180deg, #FFFFFF 0%, #FBFCFE 100%);
      box-shadow:var(--shadow);
    }
    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }
    .card-title{
      margin:0;
      font-size:1.02rem;
      font-weight:800;
      letter-spacing:-.02em;
      color:var(--navy);
    }
    .card-kicker{
      color:var(--muted);
      font-size:.86rem;
      margin-top:5px;
      line-height:1.45;
    }
    .meta-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
      margin:16px 0;
    }
    .meta-box{
      padding:12px 13px;
      border-radius:16px;
      background:#F8FAFD;
      border:1px solid var(--line);
    }
    .meta-box .label{
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--muted);
      font-weight:700;
      margin-bottom:6px;
    }
    .meta-box .value{
      font-size:.92rem;
      font-weight:700;
      color:var(--navy);
      line-height:1.4;
    }
    .tag-row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:16px 0 0;
    }
    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:8px 10px;
      border-radius:999px;
      background:#F3F6FA;
      color:var(--muted);
      font-weight:700;
      font-size:.8rem;
      border:1px solid var(--line);
    }
    .actions-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
    }

    /* =========================
       DISTRIBUTION / RING
    ========================== */
    .distribution-stack{
      display:grid;
      gap:14px;
    }
    .distribution-row{
      display:grid;
      gap:7px;
    }
    .distribution-head{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      font-size:.9rem;
    }
    .distribution-head strong{
      color:var(--navy);
    }
    .distribution-bar{
      width:100%;
      height:10px;
      border-radius:999px;
      background:#EDF2F7;
      overflow:hidden;
    }
    .distribution-bar span{
      display:block;
      height:100%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--navy) 0%, var(--teal) 100%);
    }

    .performance-wrap{
      display:grid;
      grid-template-columns:170px 1fr;
      gap:16px;
      align-items:center;
      min-height:100%;
    }
    .performance-ring{
      width:150px;
      height:150px;
      border-radius:50%;
      position:relative;
      display:grid;
      place-items:center;
      background:
        conic-gradient(var(--teal) 0 var(--pct), #E9EEF4 var(--pct) 100%);
      margin:auto;
    }
    .performance-ring::after{
      content:"";
      position:absolute;
      width:102px;
      height:102px;
      border-radius:50%;
      background:#fff;
      box-shadow:inset 0 0 0 1px var(--line);
    }
    .performance-inner{
      position:relative;
      z-index:1;
      text-align:center;
    }
    .performance-value{
      font-size:1.65rem;
      font-weight:800;
      color:var(--navy);
      letter-spacing:-.04em;
    }
    .performance-label{
      font-size:.82rem;
      color:var(--muted);
      font-weight:700;
    }

    /* =========================
       EMPTY STATES / MODAL / TOAST
    ========================== */
    .empty-state{
      display:grid;
      place-items:center;
      text-align:center;
      gap:10px;
      padding:28px 18px;
      color:var(--muted);
      background:#FAFCFF;
      border:1px dashed #D7E1EC;
      border-radius:18px;
    }
    .empty-state .empty-icon{
      width:44px;
      height:44px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:#EEF4FA;
      color:var(--navy);
      font-weight:800;
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(5, 22, 40, .5);
      padding:20px;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:80;
      backdrop-filter:blur(8px);
    }
    .modal-backdrop.show{display:flex}
    .modal{
      width:min(880px, 100%);
      max-height:86vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 28px 70px rgba(0,0,0,.18);
    }
    .modal-header{
      position:sticky;
      top:0;
      z-index:2;
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      padding:18px 18px 14px;
      background:linear-gradient(180deg, rgba(255,255,255,.98) 0%, rgba(255,255,255,.95) 100%);
      border-bottom:1px solid var(--line);
    }
    .modal-close{
      width:40px;height:40px;border-radius:14px;
      background:#F3F6FA;color:var(--navy);font-size:1.2rem;font-weight:800;
      flex:0 0 auto;
    }
    .modal-body{
      padding:18px;
      display:grid;
      gap:16px;
    }

    .toast{
      position:fixed;
      right:22px;
      bottom:96px;
      background:#082F57;
      color:#fff;
      padding:14px 16px;
      border-radius:16px;
      box-shadow:0 18px 40px rgba(0,0,0,.22);
      font-weight:700;
      opacity:0;
      transform:translateY(12px);
      pointer-events:none;
      transition:var(--transition);
      z-index:95;
      max-width:min(420px, calc(100vw - 32px));
    }
    .toast.show{
      opacity:1;
      transform:translateY(0);
    }

    /* =========================
       MOBILE NAV
    ========================== */
    .mobile-nav{
      position:fixed;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:60;
      display:none;
      grid-template-columns:repeat(5, 1fr);
      gap:8px;
      padding:8px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.7);
      border-radius:22px;
      box-shadow:0 18px 40px rgba(0,39,77,.14);
    }
    .mobile-nav-item{
      border-radius:16px;
      padding:10px 8px;
      display:grid;
      gap:4px;
      place-items:center;
      color:var(--muted);
      font-size:.73rem;
      font-weight:700;
      transition:var(--transition);
    }
    .mobile-nav-item.active{
      background:var(--navy);
      color:#fff;
    }
    .mobile-nav-item span:first-child{
      font-size:1rem;
    }

    /* =========================
       RESPONSIVE
    ========================== */
    @media (max-width: 1120px){
      .dashboard-grid,
      .content-grid,
      .performance-wrap{
        grid-template-columns:1fr;
      }
      .pipeline-board{
        overflow:auto;
      }
    }

    @media (max-width: 920px){
      .sidebar{display:none}
      .main{
        margin-left:0;
        width:100%;
        padding:20px 16px 118px;
      }
      .mobile-nav{display:grid}
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }
      .topbar-actions{
        width:100%;
        justify-content:flex-start;
      }
      .pipeline-board{
        grid-auto-flow:column;
        grid-auto-columns:minmax(260px, 1fr);
      }
    }

    @media (max-width: 620px){
      .metric-value{font-size:1.55rem}
      .meta-grid{grid-template-columns:1fr}
      .card-top,
      .list-item{
        flex-direction:column;
        align-items:flex-start;
      }
      .list-right{align-items:flex-start}
      .performance-ring{
        width:135px;height:135px;
      }
      .performance-ring::after{
        width:92px;height:92px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h2>Step Up Business Solutions</h2>
          <p>CRM ligero · Dashboard comercial</p>
        </div>
      </div>

      <nav class="nav-list">
        <button class="nav-item active" data-view="dashboard"><span class="nav-icon">▣</span><span>Dashboard</span></button>
        <button class="nav-item" data-view="contacts"><span class="nav-icon">◉</span><span>Contactos</span></button>
        <button class="nav-item" data-view="opportunities"><span class="nav-icon">◇</span><span>Oportunidades</span></button>
        <button class="nav-item" data-view="projects"><span class="nav-icon">▤</span><span>Proyectos</span></button>
        <button class="nav-item" data-view="payments"><span class="nav-icon">◎</span><span>Pagos</span></button>
      </nav>

      <div class="sidebar-foot">
        Visual pensado para operación comercial diaria, seguimiento ejecutivo y futura conexión con Google Sheets.
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="topbarEyebrow">Step Up Business Solutions</p>
          <h1 id="viewTitle">Dashboard</h1>
        </div>
        <div class="topbar-actions">
          <button class="ghost-btn" id="dateChip">15 abr 2026</button>
          <button class="primary-btn" id="syncBtn">Sincronizar demo</button>
        </div>
      </header>

      <section class="view active" id="dashboardView"></section>
      <section class="view" id="contactsView"></section>
      <section class="view" id="opportunitiesView"></section>
      <section class="view" id="projectsView"></section>
      <section class="view" id="paymentsView"></section>
    </main>
  </div>

  <nav class="mobile-nav">
    <button class="mobile-nav-item active" data-view="dashboard"><span>▣</span><span>Inicio</span></button>
    <button class="mobile-nav-item" data-view="contacts"><span>◉</span><span>Contactos</span></button>
    <button class="mobile-nav-item" data-view="opportunities"><span>◇</span><span>Oport.</span></button>
    <button class="mobile-nav-item" data-view="projects"><span>▤</span><span>Proy.</span></button>
    <button class="mobile-nav-item" data-view="payments"><span>◎</span><span>Pagos</span></button>
  </nav>

  <div class="modal-backdrop" id="detailModal">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    /* =========================
       API / DATA
    ========================== */
    const API_URL = "https://script.google.com/macros/s/AKfycbzJonCm-tnYbixIkog2gHX2JgbKXMau3RwnuqT6n8ijHwHoncTodb9QlfdU3bwDPAUEWw/exec";
    const STORAGE_KEY = "stepup-sbs-dashboard-v1";

    let contacts = [];
    let opportunities = [];
    let projects = [];
    let payments = [];

    function toISODate(value){
      if (!value) return "";
      if (typeof value === "string") {
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;
        const parsed = new Date(value);
        if (!Number.isNaN(parsed.getTime())) return parsed.toISOString().slice(0,10);
      }
      if (Object.prototype.toString.call(value) === "[object Date]" && !Number.isNaN(value.getTime())) {
        return value.toISOString().slice(0,10);
      }
      return "";
    }

    function toNumber(value){
      if (value === null || value === undefined || value === "") return 0;
      if (typeof value === "number") return value;
      const cleaned = String(value).replace(/[^\d.-]/g, "");
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : 0;
    }

    function mapContactoRows(rows){
      return rows.map(row => ({
        id: row["ID Contacto"] || "",
        date: toISODate(row["Fecha contacto"]),
        name: row["Nombre contacto"] || "Sin nombre",
        specialty: row["Negocio / Especialidad"] || "Sin especificar",
        city: row["Ciudad"] || "Sin ciudad",
        phone: String(row["WhatsApp"] || ""),
        email: row["Email"] || "",
        channel: row["Canal de ingreso lead"] || "Otro",
        interest: row["Servicio de Interés"] || "",
        notes: row["Observaciones"] || ""
      })).filter(item => item.id);
    }

    function mapOpportunityRows(rows){
      return rows.map(row => ({
        id: row["ID Oportunidad"] || "",
        contactId: row["ID Contacto"] || "",
        contactName: row["Nombre contacto"] || "",
        service: row["Servicio"] || "Sin servicio",
        plan: row["Plan"] || "Sin plan",
        quotedValue: toNumber(row["Valor cotizado"]),
        quoteDate: toISODate(row["Fecha cotización"]),
        dueDate: toISODate(row["Fecha límite"]),
        status: row["Estado Oportunidad"] || "En seguimiento",
        lossReason: row["Motivo de la Pérdida"] || "",
        summary: row["Resumen"] || ""
      })).filter(item => item.id);
    }

    function mapProjectRows(rows){
      return rows.map(row => ({
        id: row["ID Proyecto"] || "",
        contactId: row["ID Contacto"] || "",
        contactName: row["Nombre contacto"] || "",
        opportunityId: row["ID Oportunidad"] || "",
        service: row["Servicio"] || "Sin servicio",
        plan: row["Plan contratado"] || "Sin plan",
        startDate: toISODate(row["Fecha inicio"]),
        estimatedDate: toISODate(row["Fecha entrega estimada"]),
        realDate: toISODate(row["Fecha entrega real"]),
        status: row["Estado proyecto"] || "Por iniciar",
        responsible: row["Responsable"] || "Marisol Valencia",
        referredBy: row["Referido por"] || "Directo",
        soldValue: toNumber(row["Valor vendido"]),
        sheetPending: toNumber(row["Saldo pendiente"]),
        projectLink: row["Link del proyecto"] || "",
        notes: row["Observaciones"] || ""
      })).filter(item => item.id);
    }

    function mapPaymentRows(rows){
      return rows.map(row => ({
        id: row["ID Pago"] || "",
        projectId: row["ID Proyecto"] || "",
        contactId: row["ID Contacto"] || "",
        contactName: row["Nombre contacto"] || "",
        type: row["Tipo"] || "Pago único",
        amount: toNumber(row["Monto recibido"]),
        date: toISODate(row["Fecha pago"]),
        method: row["Método pago"] || "Transferencia",
        status: row["Estado pago"] || "Pendiente",
        commitmentDate: toISODate(row["Fecha compromiso saldo"]),
        notes: row["Observaciones"] || ""
      })).filter(item => item.id);
    }

    async function fetchSheet(sheetName){
      const response = await fetch(`${API_URL}?action=getAll&sheet=${encodeURIComponent(sheetName)}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const json = await response.json();
      if (!json.success) throw new Error(json.error || `Error loading ${sheetName}`);
      return json.data || [];
    }

    function saveLocalCache(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        contacts, opportunities, projects, payments
      }));
    }

    function loadLocalCache(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      try {
        const parsed = JSON.parse(raw);
        contacts = parsed.contacts || [];
        opportunities = parsed.opportunities || [];
        projects = parsed.projects || [];
        payments = parsed.payments || [];
        return true;
      } catch (error) {
        console.warn("No se pudo leer cache local", error);
        return false;
      }
    }

    async function loadData(showMessage = false){
      try {
        const [contactRows, opportunityRows, projectRows, paymentRows] = await Promise.all([
          fetchSheet("Contacto"),
          fetchSheet("Oportunidades"),
          fetchSheet("Proyectos"),
          fetchSheet("Pagos")
        ]);

        contacts = mapContactoRows(contactRows);
        opportunities = mapOpportunityRows(opportunityRows);
        projects = mapProjectRows(projectRows);
        payments = mapPaymentRows(paymentRows);

        saveLocalCache();
        if (showMessage) showToast("Sincronización completada con Google Sheets.");
      } catch (error) {
        console.error("Error conectando con Google Sheets:", error);
        const hasCache = loadLocalCache();
        if (showMessage) {
          showToast(hasCache ? "No se pudo sincronizar. Se cargó la copia local." : "No se pudo conectar con Google Sheets.");
        }
      }
    }

    const today = new Date();

/* =========================
       STATE
    ========================== */
    const state = {
      activeView: "dashboard",
      contactSearch: "",
      contactCity: "Todos",
      contactChannel: "Todos",
      oppSearch: "",
      oppStatus: "Todos",
      projectSearch: "",
      projectStatus: "Todos",
      paymentSearch: "",
      paymentStatus: "Todos",
      modalContactId: null
    };

    const viewTitles = {
      dashboard: "Dashboard",
      contacts: "Contactos",
      opportunities: "Oportunidades",
      projects: "Proyectos",
      payments: "Pagos"
    };

    /* =========================
       HELPERS
    ========================== */
    const money = new Intl.NumberFormat("es-CO", {
      style: "currency",
      currency: "COP",
      maximumFractionDigits: 0
    });

    const dateFmt = new Intl.DateTimeFormat("es-CO", {
      day: "2-digit",
      month: "short",
      year: "numeric"
    });

    function parseDate(str){
      const [y,m,d] = str.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    function normalize(value = ""){
      return String(value)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function formatCurrency(value){
      return money.format(value || 0);
    }

    function formatDate(value){
      if (!value) return "—";
      const parsed = parseDate(value);
      if (Number.isNaN(parsed.getTime())) return "—";
      return dateFmt.format(parsed);
    }

    function daysBetween(baseDate, targetDate){
      if (!(baseDate instanceof Date) || !(targetDate instanceof Date) || Number.isNaN(baseDate.getTime()) || Number.isNaN(targetDate.getTime())) {
        return 9999;
      }
      const start = new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate());
      const end = new Date(targetDate.getFullYear(), targetDate.getMonth(), targetDate.getDate());
      return Math.round((end - start) / 86400000);
    }

    function isOpenOpportunity(status){
      return status === "Cotización enviada" || status === "En seguimiento" || status === "En negociación";
    }

    function getContact(contactId){
      return contacts.find(c => c.id === contactId);
    }

    function getOpportunity(opportunityId){
      return opportunities.find(o => o.id === opportunityId);
    }

    function getProject(projectId){
      return projects.find(p => p.id === projectId);
    }

    function sumPaymentsForProject(projectId, onlyConfirmed = true){
      return payments
        .filter(p => p.projectId === projectId && (!onlyConfirmed || isReceivedPayment(p.status)))
        .reduce((sum, p) => sum + p.amount, 0);
    }

    function pendingForProject(project){
      return Math.max(0, project.soldValue - sumPaymentsForProject(project.id, true));
    }

    function statusTone(type, status){
      const maps = {
        opportunity: {
          "Cotización enviada": "navy",
          "En seguimiento": "amber",
          "En negociación": "teal",
          "Ganada": "green",
          "Perdida": "red",
          "Pausada": "violet"
        },
        project: {
          "Por iniciar": "navy",
          "En ejecución": "teal",
          "Pendiente cliente": "amber",
          "En revisión": "violet",
          "Entregado": "green",
          "Pausado": "gray"
        },
        payment: {
          "Pagado": "green",
          "Pendiente": "amber",
          "Abono parcial": "teal",
          "Vencido": "red"
        }
      };
      return (maps[type] && maps[type][status]) || "gray";
    }

    function getOpportunityUrgency(opportunity){
      if (opportunity.status === "Pausada") return { label: "Pausada", tone: "violet" };
      if (!isOpenOpportunity(opportunity.status)) {
        return { label: "Cerrada", tone: "gray" };
      }
      if (!opportunity.dueDate) return { label: "Sin fecha", tone: "gray" };
      const days = daysBetween(today, parseDate(opportunity.dueDate));
      if (days < 0) return { label: "Atrasada", tone: "red" };
      if (days <= 2) return { label: "Urgente", tone: "red" };
      if (days <= 7) return { label: "Próxima", tone: "amber" };
      return { label: "En plazo", tone: "green" };
    }

    function projectProgress(status){
      const map = {
        "Por iniciar": 18,
        "En ejecución": 55,
        "Pendiente cliente": 70,
        "En revisión": 88,
        "Entregado": 100,
        "Pausado": 50
      };
      return map[status] || 0;
    }

    function getMetrics(){
      const totalReceived = payments
        .filter(p => isReceivedPayment(p.status))
        .reduce((sum, p) => sum + p.amount, 0);

      const pendingBalance = projects.reduce((sum, project) => sum + pendingForProject(project), 0);

      const openOpportunities = opportunities.filter(o => isOpenOpportunity(o.status)).length;
      const activeProjects = projects.filter(p => p.status !== "Entregado").length;

      const won = opportunities.filter(o => o.status === "Ganada").length;
      const lost = opportunities.filter(o => o.status === "Perdida").length;
      const closeRate = won + lost === 0 ? 0 : (won / (won + lost)) * 100;

      return {
        totalReceived,
        pendingBalance,
        openOpportunities,
        activeProjects,
        closeRate,
        won,
        lost
      };
    }

    function getDueOpportunities(){
      return opportunities
        .filter(o => isOpenOpportunity(o.status))
        .filter(o => daysBetween(today, parseDate(o.dueDate)) <= 7)
        .sort((a,b) => parseDate(a.dueDate) - parseDate(b.dueDate));
    }

    function getLatestPayments(limit = 5){
      return [...payments]
        .sort((a,b) => parseDate(b.date) - parseDate(a.date))
        .slice(0, limit);
    }

    function getServiceDistribution(){
      const bucket = {};
      opportunities.forEach(item => {
        if (!bucket[item.service]) {
          bucket[item.service] = { service: item.service, total: 0, count: 0 };
        }
        bucket[item.service].total += item.quotedValue;
        bucket[item.service].count += 1;
      });
      return Object.values(bucket).sort((a,b) => b.total - a.total);
    }

    function getTopChannel(){
      const counts = {};
      contacts.forEach(c => {
        counts[c.channel] = (counts[c.channel] || 0) + 1;
      });
      return Object.entries(counts).sort((a,b) => b[1] - a[1])[0]?.[0] || "—";
    }

    function getMonthlyConfirmedTotal(){
      return payments
        .filter(p => isReceivedPayment(p.status))
        .filter(p => parseDate(p.date).getMonth() === today.getMonth() && parseDate(p.date).getFullYear() === today.getFullYear())
        .reduce((sum, p) => sum + p.amount, 0);
    }

    function getAverageTicket(){
      const confirmed = payments.filter(p => isReceivedPayment(p.status));
      if (!confirmed.length) return 0;
      return confirmed.reduce((sum, p) => sum + p.amount, 0) / confirmed.length;
    }

    function getPendingScheduledTotal(){
      return payments
        .filter(p => !isReceivedPayment(p.status))
        .reduce((sum, p) => sum + p.amount, 0);
    }

    function uniqueValues(items, key){
      return ["Todos", ...new Set(items.map(i => i[key]))];
    }

    function emptyState(message){
      return `
        <div class="empty-state">
          <div class="empty-icon">◇</div>
          <div>${message}</div>
        </div>
      `;
    }

    /* =========================
       FILTERS
    ========================== */
    function filteredContacts(){
      return contacts.filter(contact => {
        const search = normalize(state.contactSearch);
        const haystack = normalize([contact.name, contact.specialty, contact.city, contact.channel].join(" "));
        const matchesSearch = !search || haystack.includes(search);
        const matchesCity = state.contactCity === "Todos" || contact.city === state.contactCity;
        const matchesChannel = state.contactChannel === "Todos" || contact.channel === state.contactChannel;
        return matchesSearch && matchesCity && matchesChannel;
      });
    }

    function filteredOpportunities(){
      return opportunities.filter(opp => {
        const contact = getContact(opp.contactId);
        const search = normalize(state.oppSearch);
        const haystack = normalize([
          opp.id,
          contact?.name || "",
          opp.service,
          opp.plan,
          opp.summary,
          opp.status
        ].join(" "));
        const matchesSearch = !search || haystack.includes(search);
        const matchesStatus = state.oppStatus === "Todos" || opp.status === state.oppStatus;
        return matchesSearch && matchesStatus;
      }).sort((a,b) => parseDate(a.dueDate) - parseDate(b.dueDate));
    }

    function filteredProjects(){
      return projects.filter(project => {
        const contact = getContact(project.contactId);
        const search = normalize(state.projectSearch);
        const haystack = normalize([
          project.id,
          project.opportunityId,
          contact?.name || "",
          project.service,
          project.plan,
          project.status
        ].join(" "));
        const matchesSearch = !search || haystack.includes(search);
        const matchesStatus = state.projectStatus === "Todos" || project.status === state.projectStatus;
        return matchesSearch && matchesStatus;
      });
    }

    function filteredPayments(){
      return payments.filter(payment => {
        const contact = getContact(payment.contactId);
        const search = normalize(state.paymentSearch);
        const haystack = normalize([
          payment.id,
          payment.projectId,
          contact?.name || "",
          payment.type,
          payment.method,
          payment.status
        ].join(" "));
        const matchesSearch = !search || haystack.includes(search);
        const matchesStatus = state.paymentStatus === "Todos" || payment.status === state.paymentStatus;
        return matchesSearch && matchesStatus;
      }).sort((a,b) => parseDate(b.date) - parseDate(a.date));
    }

    /* =========================
       RENDER: DASHBOARD
    ========================== */
    function renderDashboard(){
      const metrics = getMetrics();
      const dueOpps = getDueOpportunities();
      const recentPayments = getLatestPayments(5);
      const activeProjects = projects
        .filter(p => p.status !== "Entregado")
        .sort((a,b) => pendingForProject(b) - pendingForProject(a));
      const serviceDistribution = getServiceDistribution();
      const maxDistribution = Math.max(...serviceDistribution.map(item => item.total), 1);

      const openPipelineValue = opportunities
        .filter(o => isOpenOpportunity(o.status))
        .reduce((sum, o) => sum + o.quotedValue, 0);

      const executingProjects = projects.filter(p => p.status === "En ejecución" || p.status === "En revisión").length;

      return `
        <div class="kpi-grid">
          <div class="card metric-card">
            <div class="metric-head">
              <span>Ingresos recibidos</span>
              <div class="metric-icon">↗</div>
            </div>
            <p class="metric-value">${formatCurrency(metrics.totalReceived)}</p>
            <div class="metric-foot">Pagos confirmados registrados en proyectos activos y entregados.</div>
          </div>

          <div class="card metric-card">
            <div class="metric-head">
              <span>Saldo pendiente</span>
              <div class="metric-icon">◎</div>
            </div>
            <p class="metric-value">${formatCurrency(metrics.pendingBalance)}</p>
            <div class="metric-foot">Pendiente calculado por proyecto según valor vendido menos pagos confirmados.</div>
          </div>

          <div class="card metric-card">
            <div class="metric-head">
              <span>Oportunidades abiertas</span>
              <div class="metric-icon">◇</div>
            </div>
            <p class="metric-value">${metrics.openOpportunities}</p>
            <div class="metric-foot">Negocios en seguimiento o negociación con opción real de cierre.</div>
          </div>

          <div class="card metric-card">
            <div class="metric-head">
              <span>Proyectos activos</span>
              <div class="metric-icon">▤</div>
            </div>
            <p class="metric-value">${metrics.activeProjects}</p>
            <div class="metric-foot">Incluye proyectos por iniciar, en ejecución, revisión o pendientes del cliente.</div>
          </div>

          <div class="card metric-card">
            <div class="metric-head">
              <span>Tasa de cierre</span>
              <div class="metric-icon">◍</div>
            </div>
            <p class="metric-value">${metrics.closeRate.toFixed(1)}%</p>
            <div class="metric-foot">Relación entre oportunidades ganadas y perdidas cerradas comercialmente.</div>
          </div>
        </div>

        <div class="summary-strip">
          <div class="summary-chip"><span>Pipeline abierto</span>${formatCurrency(openPipelineValue)}</div>
          <div class="summary-chip"><span>Pagos del mes</span>${formatCurrency(getMonthlyConfirmedTotal())}</div>
          <div class="summary-chip"><span>Canal principal</span>${getTopChannel()}</div>
          <div class="summary-chip"><span>Proyectos en ejecución/revisión</span>${executingProjects}</div>
        </div>

        <div class="dashboard-grid">
          <div class="section-card">
            <div class="section-head">
              <div>
                <h2 class="section-title">Oportunidades por vencer</h2>
                <p class="section-subtitle">Prioridades comerciales con fecha límite cercana para acelerar decisión y seguimiento.</p>
              </div>
            </div>

            ${
              dueOpps.length
                ? `<div class="list-stack">
                    ${dueOpps.map(opp => {
                      const contact = getContact(opp.contactId);
                      const urgency = getOpportunityUrgency(opp);
                      return `
                        <div class="list-item">
                          <div>
                            <strong>${contact?.name || "Contacto"}</strong>
                            <p>${opp.service} · ${opp.plan} · vence ${formatDate(opp.dueDate)}</p>
                          </div>
                          <div class="list-right">
                            <strong>${formatCurrency(opp.quotedValue)}</strong>
                            <span class="badge ${urgency.tone}">${urgency.label}</span>
                          </div>
                        </div>
                      `;
                    }).join("")}
                  </div>`
                : emptyState("No hay oportunidades abiertas con vencimiento cercano.")
            }
          </div>

          <div class="section-card">
            <div class="section-head">
              <div>
                <h2 class="section-title">Salud comercial</h2>
                <p class="section-subtitle">Lectura rápida del rendimiento de cierre actual.</p>
              </div>
            </div>

            <div class="performance-wrap">
              <div class="performance-ring" style="--pct:${metrics.closeRate}%;">
                <div class="performance-inner">

          <div class="section-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">Proyectos</h3>
                <p class="section-subtitle">Ejecución posterior al cierre comercial.</p>
              </div>
            </div>
            ${
              relatedProjects.length
                ? `<div class="list-stack">
                    ${relatedProjects.map(project => `
                      <div class="list-item">
                        <div>
                          <strong>${project.id} · ${project.service}</strong>
                          <p>${project.plan} · oportunidad ${project.opportunityId}</p>
                        </div>
                        <div class="list-right">
                          <strong>${formatCurrency(project.soldValue)}</strong>
                          <span class="badge ${statusTone("project", project.status)}">${project.status}</span>
                        </div>
                      </div>
                    `).join("")}
                  </div>`
                : emptyState("Este contacto aún no tiene proyectos asociados.")
            }
          </div>

          <div class="section-card">
            <div class="section-head">
              <div>
                <h3 class="section-title">Pagos</h3>
                <p class="section-subtitle">Movimientos financieros vinculados al contacto.</p>
              </div>
            </div>
            ${
              relatedPayments.length
                ? `<div class="list-stack">
                    ${relatedPayments.map(payment => `
                      <div class="list-item">
                        <div>
                          <strong>${payment.id} · ${payment.projectId}</strong>
                          <p>${payment.type} · ${payment.method} · ${formatDate(payment.date)}</p>
                        </div>
                        <div class="list-right">
                          <strong>${formatCurrency(payment.amount)}</strong>
                          <span class="badge ${statusTone("payment", payment.status)}">${payment.status}</span>
                        </div>
                      </div>
                    `).join("")}
                  </div>`
                : emptyState("Este contacto aún no tiene pagos registrados.")
            }
          </div>
        </div>
      `;

      modal.classList.add("show");
    }

    /* =========================
       NAV / APP
    ========================== */
    function setActiveView(view){
      state.activeView = view;
      document.getElementById("viewTitle").textContent = viewTitles[view] || "Dashboard";

      document.querySelectorAll("[data-view]").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.view === view);
      });

      document.querySelectorAll(".view").forEach(section => {
        section.classList.toggle("active", section.id === `${view}View`);
      });
    }

    function renderAll(){
      document.getElementById("dashboardView").innerHTML = renderDashboard();
      document.getElementById("contactsView").innerHTML = renderContacts();
      document.getElementById("opportunitiesView").innerHTML = renderOpportunities();
      document.getElementById("projectsView").innerHTML = renderProjects();
      document.getElementById("paymentsView").innerHTML = renderPayments();
      setActiveView(state.activeView);
      renderModal();
    }

    function showToast(message){
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2200);
    }

    /* =========================
       EVENTS
    ========================== */
    document.addEventListener("click", (e) => {
      const nav = e.target.closest("[data-view]");
      const detail = e.target.closest("[data-contact-id]");
      const closeModalBtn = e.target.closest("[data-close-modal]");

      if (nav) {
        setActiveView(nav.dataset.view);
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      if (detail) {
        state.modalContactId = detail.dataset.contactId;
        renderModal();
      }

      if (closeModalBtn) {
        state.modalContactId = null;
        renderModal();
      }

      if (e.target.id === "detailModal") {
        state.modalContactId = null;
        renderModal();
      }

      if (e.target.id === "syncBtn") {
        loadData(true).then(() => renderAll());
      }
    });

    document.addEventListener("input", (e) => {
      if (e.target.id === "contactSearch") {
        state.contactSearch = e.target.value;
        document.getElementById("contactsView").innerHTML = renderContacts();
      }
      if (e.target.id === "oppSearch") {
        state.oppSearch = e.target.value;
        document.getElementById("opportunitiesView").innerHTML = renderOpportunities();
      }
      if (e.target.id === "projectSearch") {
        state.projectSearch = e.target.value;
        document.getElementById("projectsView").innerHTML = renderProjects();
      }
      if (e.target.id === "paymentSearch") {
        state.paymentSearch = e.target.value;
        document.getElementById("paymentsView").innerHTML = renderPayments();
      }
    });

    document.addEventListener("change", (e) => {
      if (e.target.id === "contactCityFilter") {
        state.contactCity = e.target.value;
        document.getElementById("contactsView").innerHTML = renderContacts();
      }
      if (e.target.id === "contactChannelFilter") {
        state.contactChannel = e.target.value;
        document.getElementById("contactsView").innerHTML = renderContacts();
      }
      if (e.target.id === "oppStatusFilter") {
        state.oppStatus = e.target.value;
        document.getElementById("opportunitiesView").innerHTML = renderOpportunities();
      }
      if (e.target.id === "projectStatusFilter") {
        state.projectStatus = e.target.value;
        document.getElementById("projectsView").innerHTML = renderProjects();
      }
      if (e.target.id === "paymentStatusFilter") {
        state.paymentStatus = e.target.value;
        document.getElementById("paymentsView").innerHTML = renderPayments();
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        state.modalContactId = null;
        renderModal();
      }
    });

    /* =========================
       INIT
    ========================== */
    async function initApp(){
      document.getElementById("dateChip").textContent = dateFmt.format(today);
      document.getElementById("dashboardView").innerHTML = emptyState("Cargando información desde Google Sheets...");
      await loadData(false);
      renderAll();
      if (!contacts.length && !opportunities.length && !projects.length && !payments.length) {
        showToast("Dashboard listo, pero no se encontraron registros.");
      }
    }

    initApp();
  </script>
</body>
</html>
